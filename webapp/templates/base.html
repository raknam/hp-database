<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}HP Database{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: #0e0e0e; color: #e8e8e8; min-height: 100vh; }
code, pre, kbd { font-family: inherit; }
a { color: #c8a0ff; text-decoration: none; }
a:hover { text-decoration: underline; }
header { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 12px 24px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
header .logo { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: 1px; }
header .logo a { color: inherit; }
header nav { display: flex; gap: 16px; }
header nav a { color: #aaa; font-size: 0.9rem; }
header nav a:hover { color: #fff; }
.search-bar { margin-left: auto; display: flex; gap: 8px; }
.search-bar input { background: #111; border: 1px solid #333; color: #eee; padding: 6px 12px; border-radius: 4px; font-size: 0.9rem; width: 220px; }
.search-bar button { background: #5a2fa0; border: none; color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 1.6rem; margin-bottom: 20px; }
h2 { font-size: 1.2rem; margin: 24px 0 12px; color: #ccc; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 8px; overflow: hidden; transition: transform .15s; display: block; }
.card:hover { transform: translateY(-3px); text-decoration: none; }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #222; display: block; }
.card .no-img { width: 100%; aspect-ratio: 1; background: #1f1f1f; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #444; }
.card-body { padding: 10px; }
.card-body .title { font-size: 0.82rem; font-weight: 600; line-height: 1.3; color: #eee; }
.card-body .sub { font-size: 0.75rem; color: #888; margin-top: 4px; }
.badge { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 12px; background: #2a2a4a; color: #aab; margin-top: 4px; }
/* Release detail */
.release-detail { display: flex; gap: 32px; flex-wrap: wrap; }
.release-detail .cover { flex: 0 0 260px; }
.release-detail .cover img { width: 100%; border-radius: 8px; }
.release-detail .info { flex: 1; min-width: 240px; }
.meta-table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
.meta-table td { padding: 6px 10px; border-bottom: 1px solid #1f1f1f; font-size: 0.9rem; }
.meta-table td:first-child { color: #888; width: 120px; white-space: nowrap; }
.edition-block { background: #141414; border: 1px solid #222; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
.edition-header { background: #1a1a2e; padding: 10px 16px; font-weight: 600; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.edition-price { font-size: 0.8rem; color: #888; font-weight: normal; }
.edition-note { font-size: 0.78rem; color: #c8a0ff; margin-top: 2px; }
.disc-label { padding: 8px 16px 4px; font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
.track-list { list-style: none; }
.track-list li { display: flex; align-items: baseline; gap: 10px; padding: 5px 16px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
.track-list li:last-child { border-bottom: none; }
.track-idx { color: #555; width: 24px; text-align: right; flex-shrink: 0; }
.track-title { flex: 1; }
.track-suffix { color: #888; font-size: 0.78rem; }
.track-dur { color: #666; flex-shrink: 0; }
.track-credits { font-size: 0.72rem; color: #666; display: block; margin-top: 2px; }
.gallery { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
.gallery img { height: 120px; border-radius: 6px; object-fit: cover; }
/* Owned / collection */
.owned-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all .15s; }
.owned-btn.is-owned { background: #1a3a1a; border-color: #2a5a2a; color: #9fc; }
.owned-badge { display: inline-block; background: #1a3a1a; color: #9fc; border: 1px solid #2a5a2a; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; }
/* ISO */
.iso-link { color: #c8a0ff; font-size: 0.82rem; }
.iso-badge-orphan { display: inline-block; background: #3a1a1a; color: #fc9; border: 1px solid #5a2a2a; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; }
.iso-badge-absent { opacity: 0.5; }
/* Stats */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .stat-num { font-size: 2rem; font-weight: 700; color: #c8a0ff; }
.stat-card .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
/* Filters */
.filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.filter-bar select, .filter-bar input[type=text] { background: #111; border: 1px solid #333; color: #eee; padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; }
.filter-bar label { font-size: 0.85rem; color: #aaa; display: flex; align-items: center; gap: 5px; }
.filter-bar button, .filter-bar .btn { background: #5a2fa0; border: none; color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
/* Pagination */
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.pagination a, .pagination span { background: #1a1a2e; padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; color: #aaa; border: 1px solid #2a2a4a; }
.pagination a:hover { background: #5a2fa0; color: #fff; border-color: #5a2fa0; text-decoration: none; }
.pagination .current { background: #5a2fa0; color: #fff; border-color: #5a2fa0; }
/* Groups */
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.group-card { background: #141414; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
.group-card-banner { position: relative; height: 140px; overflow: hidden; background: #1a1a2e; display: block; }
.group-card-banner img { width: 100%; height: 100%; object-fit: cover; object-position: top; filter: brightness(0.7); }
.group-card-name { position: absolute; bottom: 10px; left: 14px; font-size: 1.1rem; font-weight: 700; color: #fff; text-shadow: 0 1px 4px #000; }
.group-card-body { padding: 12px 14px; }
.group-card-members { display: flex; flex-wrap: wrap; gap: 6px; }
.member-chip { display: flex; align-items: center; gap: 5px; background: #1e1e1e; border-radius: 20px; padding: 3px 10px 3px 3px; font-size: 0.75rem; text-decoration: none; color: #ccc; transition: background .12s; }
.member-chip:hover { background: #2a2a4a; color: #fff; }
.member-chip img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; object-position: top; }
.member-chip .chip-ph { width: 22px; height: 22px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
/* Member */
.member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
.member-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; text-align: center; display: block; }
.member-card:hover { text-decoration: none; transform: translateY(-2px); }
.member-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; }
.member-card .no-img { width: 100%; aspect-ratio: 3/4; background: #1f1f1f; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #444; }
.member-card-body { padding: 8px 6px; }
.member-card-body .name { font-size: 0.82rem; font-weight: 600; }
.member-card-body .sub { font-size: 0.72rem; color: #888; margin-top: 2px; }
.color-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 50%; vertical-align: middle; margin-right: 5px; border: 1px solid #333; }
/* Search */
.result-item { padding: 12px 0; border-bottom: 1px solid #1f1f1f; display: flex; gap: 12px; align-items: flex-start; }
.result-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
.result-item .no-img { width: 56px; height: 56px; background: #1f1f1f; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #444; flex-shrink: 0; }
.tag { display: inline-block; font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; background: #222; color: #888; margin-left: 6px; }
/* Admin */
.admin-section { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.btn-primary { background: #5a2fa0; border: none; color: #fff; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
.btn-primary:hover { background: #7040c0; }
.no-data { color: #555; text-align: center; padding: 40px; }
.stat-row:hover div { background: #2a2a2a !important; }
.stat-row:hover div div { background: #7040c0 !important; }
.msg-box { background: #1a3a1a; border: 1px solid #2a5a2a; color: #9fc; padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
</style>
</head>
<body>
<header>
  <span class="logo"><a href="/">HP Database</a></span>
  <nav>
    <a href="/artists">Artists</a>
    <a href="/releases">Releases</a>
    <a href="/stats">Stats</a>
    <a href="/collection">Collection</a>
    <a href="/iso">ISOs</a>
    <a href="/admin">Admin</a>
    <a href="/admin/links">Links</a>
  </nav>
  <form class="search-bar" action="/search" method="get">
    <input name="q" placeholder="Search…" value="{{ request.query_params.get('q', '') }}">
    <button type="submit">Go</button>
  </form>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
