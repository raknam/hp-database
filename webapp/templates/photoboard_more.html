{% for p in photos %}
<div class="pb-tile" data-src="/images/{{ p.filename }}" data-name="{{ p.name }}" data-href="/artists/{{ p.slug }}">
  <img src="/images/{{ p.filename }}" loading="lazy" alt="{{ p.name }}">
  <span class="pb-name">{{ p.name }}</span>
</div>
{% endfor %}

{% if has_more %}
<div class="pb-sentinel"
     hx-get="/photoboard/more?offset={{ offset }}&seed={{ seed }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"></div>
{% endif %}
